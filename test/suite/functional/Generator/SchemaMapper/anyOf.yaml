openapi: 3.0.0
info:
  title: OneOf with Nested Structures
  version: 1.0.0

paths:
  /example:
    get:
      responses:
        '200':
          description: An example of an oneOf structure
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/AnimalResponse'
                  - $ref: '#/components/schemas/MachineResponse'
                discriminator:
                  propertyName: objectType
                  mapping:
                    animal: '#/components/schemas/AnimalResponse'
                    machine: '#/components/schemas/MachineResponse'

components:
  schemas:
    AnimalResponse:
      type: object
      required:
        - objectType
        - name
      properties:
        objectType:
          type: string
        name:
          type: string
        characteristics:
          anyOf:
            - $ref: '#/components/schemas/Mammal'
            - $ref: '#/components/schemas/Bird'
    Mammal:
      type: object
      required:
        - type
        - furColor
      properties:
        type:
          type: string
        furColor:
          type: string
    Bird:
      type: object
      required:
        - type
        - wingSpan
      properties:
        type:
          type: string
          enum: [bird]
        wingSpan:
          type: integer
    MachineResponse:
      type: object
      required:
        - objectType
        - model
      properties:
        objectType:
          type: string
        model:
          type: string
        specifications:
          type: object
          properties:
            power:
              type: integer
            year:
              type: integer
